<!DOCTYPE html>
<html lang="sk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YesDay | Klientska Zóna</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Montserrat:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --cream: #f4f1ea;
            --gold: #d4af37;
            --dark: #1a1a1a;
            --white: #ffffff;
        }

        body {
            margin: 0;
            font-family: 'Montserrat', sans-serif;
            background-color: var(--cream);
            color: var(--dark);
        }

        /* DASHBOARD DESIGN */
        #dashboard {
            padding: 40px 20px;
            max-width: 1200px;
            margin: 0 auto;
        }

        .header {
            text-align: center;
            margin-bottom: 50px;
        }

        h1 {
            font-family: 'Playfair Display', serif;
            font-size: 2.5rem;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 40px;
        }

        .stat-card {
            background: white;
            padding: 20px;
            text-align: center;
            border-radius: 5px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.05);
        }

        .stat-card h3 {
            margin: 0;
            font-size: 0.8rem;
            color: #888;
            text-transform: uppercase;
        }

        .stat-card p {
            margin: 10px 0 0;
            font-size: 1.8rem;
            font-weight: 600;
            color: var(--gold);
        }

        .table-container {
            background: white;
            border-radius: 5px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.05);
            overflow-x: auto;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            min-width: 950px;
        }

        th {
            background: #fafafa;
            text-align: left;
            padding: 15px;
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            border-bottom: 2px solid var(--cream);
        }

        td {
            padding: 15px;
            border-bottom: 1px solid #eee;
            font-size: 0.9rem;
        }

        tr:hover {
            background-color: #fdfdfd;
        }

        .loading {
            text-align: center;
            padding: 50px;
            color: #888;
        }
    </style>
</head>
<body>

    <div id="dashboard">
        <div class="header">
            <h1>Diana & Anton</h1>
            <p>Prehľad prihlásených hostí v reálnom čase</p>
        </div>

        <div class="stats-grid">
            <div class="stat-card"><h3>Celkom hostí</h3><p id="total-guests">0</p></div>
            <div class="stat-card"><h3>Dospelí</h3><p id="total-adults">0</p></div>
            <div class="stat-card"><h3>Deti</h3><p id="total-kids">0</p></div>
        </div>

        <div class="table-container">
            <table id="guest-table">
                <thead>
                    <tr>
                        <th>Meno hosťa</th>
                        <th>Účasť</th>
                        <th>Dospelí</th>
                        <th>Deti</th>
                        <th>Ubytovanie</th>
                        <th>Alergie / Poznámky</th>
                    </tr>
                </thead>
                <tbody id="table-body">
                    <tr><td colspan="6" class="loading">Načítavam dáta zo svadobnej knihy...</td></tr>
                </tbody>
            </table>
        </div>
    </div>

    <script>
        const sheetURL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vTpNvrLA60PyNKyoKSM_FIw47_cs__QK4yIGyl6Fmwdjo6Ng-gGB1dGK9o-gexYXxlNV58In0kqffui/pub?output=csv';

        async function fetchData() {
            try {
                const response = await fetch(sheetURL);
                const data = await response.text();
                const rows = data.split('\n').slice(1);

                let tableHTML = "";
                let totalAdults = 0;
                let totalKids = 0;

                rows.forEach(row => {
                    if (!row.trim()) return;

                    const cols = row.split(',');
                    if (cols.length < 3) return;

                    const meno = cols[1]?.replace(/"/g, '').trim() || "-";
                    const ucast = cols[2]?.replace(/"/g, '').trim() || "-";
                    const dospeli = parseInt(cols[3]) || 0;
                    const deti = parseInt(cols[4]) || 0;
                    const ubytovanie = cols[5]?.replace(/"/g, '').trim() || "-";
                    const alergie = cols[6]?.replace(/"/g, '').trim() || "-";

                    totalAdults += dospeli;
                    totalKids += deti;

                    tableHTML += `
                        <tr>
                            <td><strong>${meno}</strong></td>
                            <td>${ucast}</td>
                            <td>${dospeli}</td>
                            <td>${deti}</td>
                            <td>${ubytovanie}</td>
                            <td>${alergie}</td>
                        </tr>
                    `;
                });

                document.getElementById('table-body').innerHTML = tableHTML || "<tr><td colspan='6'>Zatiaľ nie sú dostupné žiadne dáta.</td></tr>";
                document.getElementById('total-adults').innerText = totalAdults;
                document.getElementById('total-kids').innerText = totalKids;
                document.getElementById('total-guests').innerText = totalAdults + totalKids;

            } catch (error) {
                console.error("Chyba pri načítaní dát:", error);
                document.getElementById('table-body').innerHTML = "<tr><td colspan='6'>Chyba pri načítaní dát. Skontrolujte zdieľanie tabuľky.</td></tr>";
            }
        }

        fetchData();
    </script>
</body>
</html>
