<!DOCTYPE html>
<html lang="sk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YesDay studio | Svadobné weby na mieru</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Montserrat:wght@300;400&display=swap" rel="stylesheet">
    <style>
        body {
            margin: 0; padding: 0; background-color: #f4f1ea; color: #1a1a1a;
            font-family: 'Montserrat', sans-serif; display: flex; align-items: center;
            justify-content: center; min-height: 100vh; text-align: center;
        }
        .container {
            border: 1px solid #d4af37; padding: 60px 40px; max-width: 600px;
            background-color: white; box-shadow: 0 10px 30px rgba(0,0,0,0.05);
        }
        h1 {
            font-family: 'Playfair Display', serif; font-size: 3rem; margin: 0;
            letter-spacing: 4px; text-transform: uppercase;
        }
        h2 {
            font-family: 'Montserrat', sans-serif; font-weight: 300; font-size: 1rem;
            letter-spacing: 6px; margin-top: 10px; margin-bottom: 30px; text-transform: uppercase;
        }
        .line { width: 60px; height: 1px; background-color: #d4af37; margin: 20px auto; }
        p { line-height: 1.8; font-style: italic; color: #555; margin-bottom: 30px; }
        .cta-button {
            display: inline-block; padding: 15px 35px; background-color: #1a1a1a;
            color: white; text-decoration: none; font-size: 0.75rem; letter-spacing: 2px;
            text-transform: uppercase; transition: 0.4s; border: 1px solid #1a1a1a;
        }
        .cta-button:hover { background-color: transparent; color: #1a1a1a; }
    </style>
</head>
<body>
    <div class="container">
        <h1>YES DAY</h1>
        <h2>STUDIO</h2>
        <div class="line"></div>
        <p>Vaša svadba v digitálnom štýle. Vytvárame moderné svadobné weby a oznámenia s QR kódom na mieru.</p>
        <p>Na našom oficiálnom webe práve pracujeme...</p>
        <a href="https://www.instagram.com/yesday_studio" class="cta-button">Sledujte nás na Instagrame</a>
    </div>
</body>
</html>
